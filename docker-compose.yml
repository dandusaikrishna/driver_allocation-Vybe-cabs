services:
  postgres:
    image: postgres:16-alpine
    container_name: vybe-postgres
    environment:
      POSTGRES_USER: vybe
      POSTGRES_PASSWORD: vybe_secret
      POSTGRES_DB: vybe_cabs
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vybe -d vybe_cabs']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vybe-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
